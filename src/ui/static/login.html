<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · IssueTrack</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm rounded-xl border border-slate-200 bg-white p-8 shadow-sm">
    <div class="mb-6 text-center">
      <span class="text-2xl font-extrabold tracking-tight text-blue-700">IssueTrack</span>
      <p class="mt-1 text-sm text-slate-500">Sign in to continue</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div class="space-y-1">
        <label for="username" class="block text-xs font-semibold text-slate-500">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required
               class="w-full rounded-md border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">
      </div>
      <div class="space-y-1">
        <label for="password" class="block text-xs font-semibold text-slate-500">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
               class="w-full rounded-md border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">
      </div>
      <div id="err" class="hidden rounded-md bg-red-50 px-3 py-2 text-sm text-red-700"></div>
      <button type="submit"
              class="w-full rounded-md bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-700">
        Sign in
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!r.ok) {
          const detail = (await r.json().catch(() => ({}))).detail || `HTTP ${r.status}`;
          throw new Error(detail);
        }
        // Land on the requested page if present, else home.
        const next = new URLSearchParams(window.location.search).get('next') || '/';
        window.location.href = next;
      } catch (err) {
        errEl.textContent = String(err.message || err);
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
